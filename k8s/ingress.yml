apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: main-ingress
  annotations:
    # Optional annotations for future use (e.g., cert-manager for HTTPS)
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx  # Tells Kubernetes to use the Ingress-Nginx controller
  rules:
    # Rule 1: Host-based routing for the Frontend
    - host: k8s.izhardev.me
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-svc
                port:
                  number: 80 # This must match the 'port' defined in your frontend-svc Service

    # Rule 2: Host-based routing for the Backend API
    - host: api.izhardev.me
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: backend-svc
                port:
                  number: 80 # This must match the 'port' defined in your backend-svc Service
